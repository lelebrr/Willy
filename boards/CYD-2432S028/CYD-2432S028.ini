; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

##################################### CYD MODELS ####################################################
[CYD_base]
board = CYD-2432S028
monitor_speed = 115200
board_build.partitions = custom_4Mb_full.csv
build_src_filter =${env.build_src_filter} +<../boards/CYD-2432S028>
build_flags =
	${env.build_flags}
	-Iboards/CYD-2432S028
	-Os

	-DCORE_DEBUG_LEVEL=0
	-DCONFIG_ESP32_JTAG_SUPPORT_DISABLE=1
	;-DARDUINO_USB_CDC_ON_BOOT=1  ; Used only in ESP32-S3 to make Serial Comands work
	-DBRUCE_IR_SERIAL=1

	-DCYD=1 	;key for new device,
					;mykeyboard.cpp: need map buttons an/or touchscreen and battery status value,
					;settings.cpp:   need map brighness control
					;main.cpp:		  need set startup
					;serialcmds.cpp: need set power off command

	;Features Enabled
	;FM Radio
	;-DFM_SI4713=1 ;FM Radio disabled: CYD ESP32 has no GPIO 40
	;-DFM_RSTPIN=40 ;GPIO 40 invalid on ESP32 (max 39)
	;-DLITE_VERSION=1 ;limits some features to save space for M5Launcher Compatibility
	;Microphone
	;-DMIC_SPM1423=1 ;uncomment to enable Applicable for SPM1423 device
	-DPIN_CLK=-1
	-DI2S_SCLK_PIN=-1
	-DI2S_DATA_PIN=-1
	-DPIN_DATA=-1

	;RGB LED runned by xylopyrographer/LiteLED@^1.2.0 library
	;-DHAS_RGB_LED=1  ;uncomment to enable
	-DRGB_LED=-1

	;Have RTC Chip
	;-DHAS_RTC=1

	;Speaker to run music, compatible with NS4168
	;-DHAS_NS4168_SPKR=1 ;uncomment to enable
	-DBCLK=-1
	-DWCLK=-1
	-DDOUT=-1
	-DBUZZ_PIN=26

	;Can run USB as HID
	;-DUSB_as_HID=1 ;uncomment to enable
	-DBAD_TX=GROVE_SDA
	-DBAD_RX=GROVE_SCL

	; SERIAL (GPS) dedicated pins
	-DSERIAL_TX=1
	-DSERIAL_RX=3
	-DGPS_SERIAL_TX=SERIAL_TX
	-DGPS_SERIAL_RX=SERIAL_RX

	;Battery ADC read pin
	;-DBAT_PIN=10

	;Buttons configuration
	-DHAS_BTN=0
	-DBTN_ALIAS='"Ok"'
	-DBTN_PIN=0

	-DALLOW_ALL_GPIO_FOR_IR_RF=1 ; Set this option to make use of all GPIOs, from 1 to 44 to be chosen, except TFT and SD pins

	;Infrared Led default pin and state
	-DIR_TX_PINS='{{"Pin 1", 1}, {"Pin 3", 3}}'
	-DIR_RX_PINS='{{"Pin 1", 1}, {"Pin 3", 3}, {"Pin 35", 35}}'
	-DTXLED=1		;NEED TO SET SOMETHING HERE, at least -1
	-DLED_ON=HIGH
	-DLED_OFF=LOW

	;Radio Frequency (one pin modules) pin setting
	-DRF_TX_PINS='{{"Pin 22", 22}, {"Pin 27", 27}}'
	-DRF_RX_PINS='{{"Pin 22", 22}, {"Pin 27", 27}, {"Pin 35", 35}}'

	;CC1101 SPI connection pins
	; best connection pins for higher speed https://docs.espressif.com/projects/esp-idf/en/latest/esp32s3/api-reference/peripherals/spi_master.html#gpio-matrix-and-io-mux
	-DUSE_CC1101_VIA_SPI
	-DCC1101_GDO0_PIN=27
	-DCC1101_SS_PIN=22
	-DCC1101_MOSI_PIN=SPI_MOSI_PIN
	-DCC1101_SCK_PIN=SPI_SCK_PIN
	-DCC1101_MISO_PIN=SPI_MISO_PIN
	;-DCC1101_GDO2_PIN=14  ; optional

	; connections are the same as CC1101
	-DUSE_NRF24_VIA_SPI
	-DNRF24_CE_PIN=27
	-DNRF24_SS_PIN=22  ; chip select
	-DNRF24_MOSI_PIN=SPI_MOSI_PIN
	-DNRF24_SCK_PIN=SPI_SCK_PIN
	-DNRF24_MISO_PIN=SPI_MISO_PIN

	-DUSE_W5500_VIA_SPI
	-DW5500_SS_PIN=27
	-DW5500_MOSI_PIN=SPI_MOSI_PIN
	-DW5500_SCK_PIN=SPI_SCK_PIN
	-DW5500_MISO_PIN=SPI_MISO_PIN
	-DW5500_INT_PIN=22

	;Font sizes, depending on device
	-DFP=1
	-DFM=2
	-DFG=3

	;Screen Setup
	-DHAS_SCREEN=1
	-DROTATION=1
	-DBACKLIGHT=21
	-DMINBRIGHT=160

	;TFT_eSPI Setup
	-DUSER_SETUP_LOADED=1
	-DILI9341_2_DRIVER=1
	-DUSE_HSPI_PORT=1
	-DTFT_HEIGHT=320
	-DTFT_WIDTH=240
	-DTFT_MISO=12
	-DTFT_MOSI=13
	-DTFT_SCLK=14
	-DTFT_CS=15
	-DTFT_DC=2
	-DTFT_RST=-1
	-DTFT_BACKLIGHT_ON=HIGH
	-DSMOOTH_FONT=1

	;TouchScreen Controller
	-DHAS_TOUCH=1

	;SD Card Setup pins
	-DSDCARD_CS=5
	-DSDCARD_SCK=18
	-DSDCARD_MISO=19
	-DSDCARD_MOSI=23

	;tft Brighness Control
	-DTFT_BRIGHT_CHANNEL=0
	-DTFT_BRIGHT_Bits=8
	-DTFT_BRIGHT_FREQ=5000

	;Default I2C port (shared with CC1101_GDO0, NRF24_CE, W5500_SS - mutually exclusive peripherals)
	-DGROVE_SDA=27
	-DGROVE_SCL=22  ; Shared with CC1101_SS, NRF24_SS, W5500_INT

	-DSPI_SCK_PIN=18
	-DSPI_MOSI_PIN=23
	-DSPI_MISO_PIN=19
	-DSPI_SS_PIN=27 ;grove beside SDCard
	-DDEVICE_NAME='"CYD-2432S028"'

lib_deps =
	${env.lib_deps}
lib_ignore =
	FastLED
	ESP8266Audio
	ESP8266SAM

[CYD35_base]
board = CYD-2432S028
monitor_speed = 115200
board_build.partitions = custom_4Mb_full.csv
build_src_filter =${env.build_src_filter} +<../boards/CYD-2432S028>
build_flags =
	${env.build_flags}
	-Iboards/CYD-2432S028
	-Os

	-DCORE_DEBUG_LEVEL=0
	-DCONFIG_ESP32_JTAG_SUPPORT_DISABLE=1
	;-DARDUINO_USB_CDC_ON_BOOT=1  ; Used only in ESP32-S3 to make Serial Comands work
	-DBRUCE_IR_SERIAL=1

	-DCYD=1 	;key for new device,
					;mykeyboard.cpp: need map buttons an/or touchscreen and battery status value,
					;settings.cpp:   need map brighness control
					;main.cpp:		  need set startup
					;serialcmds.cpp: need set power off command

	;Features Enabled
	;FM Radio
	;-DFM_SI4713=1 ;FM Radio disabled: CYD ESP32 has no GPIO 40
	;-DFM_RSTPIN=40 ;GPIO 40 invalid on ESP32 (max 39)
	;-DLITE_VERSION=1 ;limits some features to save space for M5Launcher Compatibility
	;Microphone
	;-DMIC_SPM1423=1 ;uncomment to enable Applicable for SPM1423 device
	-DPIN_CLK=-1
	-DI2S_SCLK_PIN=-1
	-DI2S_DATA_PIN=-1
	-DPIN_DATA=-1

	;RGB LED runned by xylopyrographer/LiteLED@^1.2.0 library
	;-DHAS_RGB_LED=1  ;uncomment to enable
	-DRGB_LED=-1
	;CYD-3248S035 RGB LED pins: R=GPIO4 (active LOW), G=GPIO16, B=GPIO17

	;Have RTC Chip
	;-DHAS_RTC=1

	;Speaker to run music, compatible with NS4168
	;-DHAS_NS4168_SPKR=1 ;uncomment to enable
	-DBCLK=-1
	-DWCLK=-1
	-DDOUT=-1
	-DBUZZ_PIN=26

	;Can run USB as HID
	;-DUSB_as_HID=1 ;uncomment to enable
	-DBAD_TX=GROVE_SDA
	-DBAD_RX=GROVE_SCL

	; SERIAL (GPS) dedicated pins
	-DSERIAL_TX=1
	-DSERIAL_RX=3
	-DGPS_SERIAL_TX=SERIAL_TX
	-DGPS_SERIAL_RX=SERIAL_RX

	; CYD-3248S035 Expansion Ports (P1, P3, CN1)
	; P1 (UART): TX=1, RX=3
	; P3 (Extended IO): GND, GPIO35 (Input Only), GPIO22, GPIO21
	; CN1 (I2C/IO): GPIO22 (SCL), GPIO27 (SDA/IO). Resistive touch leaves pin3 NC, Capacitive uses IO22 for GT911.

	;Battery ADC read pin
	; The CYD-3248S035 has a 4P 1.25mm connector for battery/power but NO native ADC voltage divider.
	; To read battery, a physical mod is required (e.g. connecting a voltage divider to P3's GPIO35).
	;-DBAT_PIN=10 ; Uncomment and change to 35 if modded

	;Buttons configuration
	-DHAS_BTN=0
	-DBTN_ALIAS='"Ok"'
	-DBTN_PIN=0

	-DALLOW_ALL_GPIO_FOR_IR_RF=1 ; Set this option to make use of all GPIOs, from 1 to 44 to be chosen, except TFT and SD pins

	;Infrared Led default pin and state
	-DIR_TX_PINS='{{"Pin 1", 1}}'
	-DIR_RX_PINS='{{"Pin 1", 1}, {"Pin 35", 35}}'
	-DTXLED=1		;NEED TO SET SOMETHING HERE, at least -1
	-DLED_ON=HIGH
	-DLED_OFF=LOW

	;Radio Frequency (one pin modules) pin setting
	-DRF_TX_PINS='{{"Pin 22", 22}}'
	-DRF_RX_PINS='{{"Pin 22", 22}, {"Pin 35", 35}}'

	;CC1101 SPI connection pins
	; best connection pins for higher speed https://docs.espressif.com/projects/esp-idf/en/latest/esp32s3/api-reference/peripherals/spi_master.html#gpio-matrix-and-io-mux
	-DUSE_CC1101_VIA_SPI
	-DCC1101_GDO0_PIN=27
	-DCC1101_SS_PIN=22
	-DCC1101_MOSI_PIN=SPI_MOSI_PIN
	-DCC1101_SCK_PIN=SPI_SCK_PIN
	-DCC1101_MISO_PIN=SPI_MISO_PIN
	;-DCC1101_GDO2_PIN=14  ; optional

	; connections are the same as CC1101
	-DUSE_NRF24_VIA_SPI
	-DNRF24_CE_PIN=27
	-DNRF24_SS_PIN=22  ; chip select
	-DNRF24_MOSI_PIN=SPI_MOSI_PIN
	-DNRF24_SCK_PIN=SPI_SCK_PIN
	-DNRF24_MISO_PIN=SPI_MISO_PIN

	-DUSE_W5500_VIA_SPI
	-DW5500_SS_PIN=35
	-DW5500_MOSI_PIN=SPI_MOSI_PIN
	-DW5500_SCK_PIN=SPI_SCK_PIN
	-DW5500_MISO_PIN=SPI_MISO_PIN
	-DW5500_INT_PIN=22

	;Font sizes, depending on device (scaled for 480x320)
	-DFP=2
	-DFM=3
	-DFG=4

	;Screen Setup
	-DHAS_SCREEN=1
	-DROTATION=1
	-DBACKLIGHT=27
	-DMINBRIGHT=160
	-DTFT_BL=27

	;TFT_eSPI Setup
	-DUSER_SETUP_LOADED=1
	-DST7796_DRIVER=1
	-DUSE_HSPI_PORT=1
	-DTFT_HEIGHT=480
	-DTFT_WIDTH=320
	-DTFT_MISO=12
	-DTFT_MOSI=13
	-DTFT_SCLK=14
	-DTFT_CS=15
	-DTFT_DC=2
	-DTFT_RST=-1
	-DTFT_BACKLIGHT_ON=HIGH
	-DSMOOTH_FONT=1

	;TouchScreen Controller
	-DHAS_TOUCH=1

	;SD Card Setup pins
	-DSDCARD_CS=5
	-DSDCARD_SCK=18
	-DSDCARD_MISO=19
	-DSDCARD_MOSI=23

	;tft Brighness Control
	-DTFT_BRIGHT_CHANNEL=0
	-DTFT_BRIGHT_Bits=8
	-DTFT_BRIGHT_FREQ=5000

	;Default I2C port
	-DGROVE_SDA=27
	-DGROVE_SCL=22

	-DSPI_SCK_PIN=18
	-DSPI_MOSI_PIN=23
	-DSPI_MISO_PIN=19
	-DSPI_SS_PIN=27 ;grove beside SDCard
	-DDEVICE_NAME='"CYD-3248S035"'

lib_deps =
	${env.lib_deps}
lib_ignore =
	FastLED
	ESP8266Audio
	ESP8266SAM

##################################### CYD MODELS ####################################################
[env:CYD-2432S028]
extends=CYD_base
build_unflags = -DDEVICE_NAME='"CYD-2432S028"'
build_flags =
	${CYD_base.build_flags}
	-DTFT_BL=21
	-DSPI_FREQUENCY=55000000
	-DSPI_READ_FREQUENCY=20000000
	-DSPI_TOUCH_FREQUENCY=2500000
	-DTOUCH_CS=33
	-DDEVICE_NAME='"CYD-2432S028"'

[env:CYD-2USB]
extends=env:CYD-2432S028
build_unflags =
	-DDEVICE_NAME='"CYD-2432S028"'
	-DILI9341_2_DRIVER=1	; CYD-2USB uses ST7789, not ILI9341_2
	-DTOUCH_CS=33
build_flags =
	${env:CYD-2432S028.build_flags}
	; Display driver: ST7789 (confirmed for 2-USB variant)
	-DST7789_DRIVER=1
	-DTFT_INVERSION_OFF
	-DTFT_RGB_ORDER=TFT_BGR
	; TFT_BL=21 is inherited from parent (correct for CYD-2USB)
	; BACKLIGHT=21 is inherited from CYD_base (correct for CYD-2USB)
	; Capacitive touch via I2C (CST816D: SDA=33, SCL=32, RST=25, INT=21)
	-DHAS_CAPACITIVE_TOUCH=1
	-DTOUCH_MODULES_CST_MUTI=1
	-DBOARD_TOUCH_INT=-1
	-DTOUCH_INT=-1
	-DTOUCH_CS=-1			; No SPI touch on this board
	; Device name and peripherals
	-DDEVICE_NAME='"CYD-2USB"'
	; IR pins: ALLOW_ALL_GPIO_FOR_IR_RF=1 is set in CYD_base, overrides all IR/RF pin lists
	-DTXLED=-1				; Usando porta Serial (P1) compartilhada com GPS
	-DDEFAULT_RF_MODULE=1	; CC1101_SPI_MODULE
	-DDEFAULT_RFID_MODULE=1	; PN532_I2C_MODULE
upload_port = COM3
lib_ldf_mode = chain

[env:LAUNCHER_CYD-2USB]
extends=env:CYD-2USB
board_build.partitions = custom_4Mb.csv
build_flags =
	${env:CYD-2USB.build_flags}
	${env_light.build_flags}
lib_deps =
	${env_light.lib_deps}

[env:CYD-2432W328C]
extends = CYD_base
build_flags =
	${CYD_base.build_flags}
	-DTFT_INVERSION_ON
	-DTFT_BL=27
	-DSPI_FREQUENCY=55000000
	-DSPI_READ_FREQUENCY=20000000
	-DSPI_TOUCH_FREQUENCY=2500000
	-DHAS_CAPACITIVE_TOUCH=1
	-DTOUCH_MODULES_CST_MUTI=1
	-DBOARD_TOUCH_INT=-1
	-DTOUCH_INT=-1
 	-DTOUCH_CS=-1 # This pin is used for I2C communication, not for CS SPI control in this device
	-DDEVICE_NAME='"CYD-2432W328C"'

[env:LAUNCHER_CYD-2432S028]
extends=env:CYD-2432S028
board_build.partitions = custom_4Mb.csv
build_flags =
	${env:CYD-2432S028.build_flags}
	${env_light.build_flags}
lib_deps =
	${env_light.lib_deps}

[env:CYD-2432W328C_2] # commom to CYD-2432S024 Capacitive board
extends = env:CYD-2432W328C
build_unflags =
	-DTFT_INVERSION_ON
	-DDEVICE_NAME='"CYD-2432W328C"'
build_flags =
	${env:CYD-2432W328C.build_flags}
	-DDEVICE_NAME='"CYD-2432W328C_2"'

[env:LAUNCHER_CYD-2432W328C]
extends=env:CYD-2432W328C
board_build.partitions = custom_4Mb.csv
build_flags =
	${env:CYD-2432W328C.build_flags}
	${env_light.build_flags}
lib_deps =
	${env_light.lib_deps}

[env:CYD-2432W328R-or-S024R]
extends = CYD_base
build_flags =
	${CYD_base.build_flags}
	-DTFT_INVERSION_ON
	-DTFT_BL=27
	-DTOUCH_OFFSET_ROTATION=1
	-DSPI_FREQUENCY=55000000
	-DSPI_READ_FREQUENCY=20000000
	-DSPI_TOUCH_FREQUENCY=2500000
	-DTOUCH_CS=33
	-DUSE_TFT_eSPI_TOUCH
	-DTOUCH_CONFIG_INT_GPIO_NUM=36
	-DDEVICE_NAME='"CYD-2432W328R-or-S024R"'

[env:LAUNCHER_CYD-2432W328R-or-S024R]
extends = env:CYD-2432W328R-or-S024R
board_build.partitions = custom_4Mb.csv
build_flags =
	${env:CYD-2432W328R-or-S024R.build_flags}
	${env_light.build_flags}
lib_deps =
	${env_light.lib_deps}


[env:CYD-3248S035R]
extends=CYD35_base
build_unflags =
	-DDEVICE_NAME='"CYD-3248S035"'
build_flags =
	${CYD35_base.build_flags}
	-DST7796_DRIVER=1
	-DTFT_BL=27
	-DTOUCH_OFFSET_ROTATION=1
	-DSPI_FREQUENCY=55000000
	-DSPI_READ_FREQUENCY=20000000
	-DSPI_TOUCH_FREQUENCY=2500000
	-DTOUCH_CS=33
	-DUSE_TFT_eSPI_TOUCH
	-DTOUCH_CONFIG_INT_GPIO_NUM=36
	-DDEVICE_NAME='"CYD-3248S035R"'

[env:LAUNCHER_CYD-3248S035R]
extends=env:CYD-3248S035R
board_build.partitions = custom_4Mb.csv
build_flags =
	${env:CYD-3248S035R.build_flags}
	${env_light.build_flags}
lib_deps =
	${env_light.lib_deps}

[env:CYD-3248S035C]
extends = CYD35_base
build_unflags =
	-DDEVICE_NAME='"CYD-3248S035"'
	-DUSE_TFT_eSPI_TOUCH=1
	-DBOARD_TOUCH_INT=-1
build_flags =
	${CYD35_base.build_flags}
	-DTFT_INVERSION_ON
	-DTOUCH_INVERTED=1
	-DHAS_CAPACITIVE_TOUCH=1
	-DTOUCH_MODULES_CST_MUTI=1
	-DTOUCH_GT911_I2C=1
	-DGT911_SLAVE_ADDRESS_L=0x5D
    -DGT911_I2C_CONFIG_SDA_IO_NUM=33
    -DGT911_I2C_CONFIG_SCL_IO_NUM=32
    -DGT911_TOUCH_CONFIG_INT_GPIO_NUM=25
    -DGT911_TOUCH_CONFIG_RST_GPIO_NUM=21
	-DBOARD_TOUCH_INT=25
	-DTOUCH_INT=25
	-DTOUCH_CS=-1 # This pin is used for I2C communication, not for CS SPI control in this device
	-DDEVICE_NAME='"CYD-3248S035C"'
lib_deps =
	${env.lib_deps}
	lewisxhe/SensorLib

[env:LAUNCHER_CYD-3248S035C]
extends=env:CYD-3248S035C
board_build.partitions = custom_4Mb.csv
build_flags =
	${env:CYD-3248S035C.build_flags}
	${env_light.build_flags}
lib_deps =
	${env_light.lib_deps}
	lewisxhe/SensorLib

